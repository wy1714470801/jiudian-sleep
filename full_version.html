                    '温度极低，能先冻住再烧成灰烬',
                    '能让人浴火重生，哪怕只剩灰烬也能涅槃',
                    '带有剧毒，烧到的地方会溃烂，毒遍全身',
                    '能勾起人的欲望和怒火，让人失去理智',
                    '从地心冒出，温度极高，炼丹炼器效果极好',
                    '有自己的意识，能自己修炼，还能帮主人战斗',
                    '至阳至刚，是一切阴邪之物的克星',
                    '能净化邪祟、魔气、怨气，还能治疗伤势',
                    '专门焚烧罪孽深重的人，痛苦程度是普通火的十倍',
                    '能燃烧灵魂、法器、护盾，碰到就魂飞魄散',
                    '能净化一切杂质，炼出来的都是极品',
                    '能烧穿一切防御，被烧到会变成冰雕然后碎裂',
                    '能提升修炼速度，但控制不好会烧毁丹田',
                    '能在水中燃烧，遇水不灭反而更旺',
                    '能吞噬一切火焰，被吞噬的火焰成为养分',
                    '能熔化一切金属，炼器必备',
                    '能治疗伤势，让死去的植物重新生长'
                ]
            },
            '奇雷': {
                prefixes: ['神霄', '紫霄', '九霄', '天雷', '劫雷', '业雷', '龙雷', '凤雷', '魔雷', '神雷'],
                appearances: [
                    '雷电呈现紫色，霹雳闪烁，雷声震天，威势惊人',
                    '雷电呈现金色，带着龙威，能压制一切妖兽',
                    '雷电呈现黑色，充满魔气，能腐蚀一切',
                    '雷电呈现银白色，至阳至刚，能破除一切邪祟'
                ],
                abilities: [
                    '一雷劈下能劈碎山岳，威力毁天灭地',
                    '能淬炼肉身，让身体变得刀枪不入',
                    '能劈碎心魔，让心境更加稳固',
                    '能追踪敌人，不管跑多远都能劈中'
                ]
            },
            '奇兽': {
                prefixes: ['太古', '洪荒', '上古', '远古', '神兽', '凶兽', '异兽', '妖兽', '灵兽', '魔兽'],
                appearances: [
                    '体型庞大如山岳，浑身覆盖着坚硬的鳞甲，散发着太古的气息',
                    '形似龙凤，却又不同，身上流转着七彩光芒，神异非凡',
                    '浑身漆黑，双眼猩红，獠牙外露，凶威滔天',
                    '通体雪白，毛发如丝，眼神温和，散发着祥瑞之气'
                ],
                abilities: [
                    '能吞噬天地灵气，一口能吸干方圆百里的灵气',
                    '能操控风雷，呼风唤雨，所过之处天地变色',
                    '力大无穷，能撕裂空间，一爪能抓碎山岳',
                    '能治疗万物，让枯木逢春，死地变绿洲'
                ]
            }
        };

        function generateCreatureDesc(type) {
            const templates = creatureTemplates[type];
            if (!templates) return null;
            
            const prefix = getRandom(templates.prefixes);
            const appearance = getRandom(templates.appearances);
            const ability = getRandom(templates.abilities);
            
            // 根据类型调整格式
            if (type === '奇鬼') {
                return `${prefix}鬼${appearance}，${ability}`;
            } else if (type === '奇火') {
                return `${prefix}火${appearance}，${ability}`;
            } else if (type === '奇雷') {
                return `${prefix}雷${appearance}，${ability}`;
            } else if (type === '奇兽') {
                return `${prefix}遗种${appearance}，${ability}`;
            }
            return null;
        }

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateStory() {
            return getRandom(storyOrigins) + getRandom(storyCreators) + getRandom(storyReasons) + getRandom(storyEndings);
        }

        function generateSkill(typeFilter = 'all', difficultyFilter = 'all', gradeFilter = 'all', realmFilter = 'all', keyword = '') {
            let type;
            if (typeFilter === 'all') {
                const types = Object.keys(data);
                type = getRandom(types);
            } else {
                type = typeFilter;
            }
            const item = data[type];
            
            // 验证类型是否存在
            if (!item) {
                console.error('未找到类型:', type);
                return null;
            }
            
            // 4种名称生成模式，完全不重复
            const nameMode = Math.floor(Math.random() * 4);
            let name;
            
            // 获取当前类型的词库
            const prefixes = typePrefixes[type] || typePrefixes['奇鬼'];
            const middles = typeMiddles[type] || typeMiddles['奇鬼'];
            const suffixes = typeSuffixes[type] || typeSuffixes['奇鬼'];
            
            if (nameMode === 0) {
                // 前缀+中缀+后缀 完全随机组合
                name = getRandom(prefixes) + getRandom(middles) + getRandom(suffixes);
            } else if (nameMode === 1) {
                // 前缀+属性+后缀
                const attrMap = {
                    '奇鬼': '鬼', '奇火': '火', '奇雷': '雷', '奇水': '水', '奇体': '体',
                    '奇剑': '剑', '奇丹': '丹', '奇符': '符', '奇阵': '阵', '奇兽': '兽',
                    '奇魔': '魔', '奇佛': '佛', '奇画': '画'
                };
                name = getRandom(prefixes) + attrMap[type] + getRandom(suffixes);
            } else if (nameMode === 2) {
                // 类型特色成语+功法后缀
                const typeIdioms = {
                    '奇鬼': ['幽冥鬼域', '百鬼夜行', '万鬼朝宗', '阴魂不散', '鬼哭神嚎'],
                    '奇火': ['焚天煮海', '烈火燎原', '凤凰涅槃', '浴火重生', '炼狱焚心'],
                    '奇雷': ['雷霆万钧', '九霄神雷', '雷动九天', '霹雳震天', '天雷滚滚'],
                    '奇水': ['翻江倒海', '冰封千里', '弱水三千', '玄冰寒水', '天一真水'],
                    '奇体': ['金刚不坏', '不灭金身', '荒古圣体', '混沌之体', '九转玄功'],
                    '奇剑': ['万剑归宗', '人剑合一', '诛仙戮神', '青莲剑歌', '御剑飞行'],
                    '奇丹': ['九转金丹', '炼丹成仙', '丹道通神', '起死回生', '洗髓伐毛'],
                    '奇符': ['符箓通神', '画符成真', '天雷降世', '神行千里', '金刚护体'],
                    '奇阵': ['诛仙剑阵', '周天星斗', '九宫八卦', '冰火两仪', '困龙升天'],
                    '奇兽': ['万兽朝宗', '百兽之王', '驭兽成军', '兽魂融合', '太古遗种'],
                    '奇魔': ['噬血魔功', '天魔解体', '夺舍重生', '魔焰滔天', '吞天灭地'],
                    '奇佛': ['金刚不坏', '大慈大悲', '普渡众生', '佛光普照', '降魔伏妖'],
                    '奇画': ['画龙点睛', '画地为牢', '画中世界', '点石成金', '移山填海']
                };
                const idioms = typeIdioms[type] || typeIdioms['奇鬼'];
                name = getRandom(idioms) + getRandom(['诀', '术', '法', '功', '经']);
            } else {
                // 上古+名称
                const ancient = ['上古', '太古', '洪荒', '远古', '中古', '近古', '混沌', '鸿蒙', '先天', '后天', '太初', '太素', '太始', '太易', '无极', '太极', '无上', '至尊', '玄天', '紫霄', '青冥', '碧落', '黄泉', '九天', '九幽', '三清', '五老', '六合', '八荒', '万古', '千秋', '永恒', '不朽', '不灭', '长生', '涅槃', '轮回', '造化', '乾坤'];
                name = getRandom(ancient) + getRandom(prefixes) + getRandom(suffixes);
            }
            
            let desc = getRandom(item.descs);
            
            // 20%概率生成新奇设定描述
            if (Math.random() < 0.2 && creatureTemplates[type]) {
                const creatureDesc = generateCreatureDesc(type);
                if (creatureDesc) {
                    desc = creatureDesc;
                }
            }
            
            let side;
            
            // 副作用去重
            let attempts = 0;
            do {
                side = getRandom(item.sides);
                attempts++;
            } while (usedSideEffects.has(side) && attempts < 10);
            usedSideEffects.add(side);
            
            const difficulty = difficultyFilter === 'all' ? getRandom(difficulties) : difficultyFilter;
            const grade = gradeFilter === 'all' ? getRandom(grades) : gradeFilter;
            const realm = realmFilter === 'all' ? getRandom(realms) : realmFilter;
            
            // 关键词替换
            if (keyword.trim()) {
                desc = desc.replace(/鬼|火|雷|水|体|剑|丹|符|阵|兽|魔|佛|画/g, keyword);
                side = side.replace(/鬼|火|雷|水|体|剑|丹|符|阵|兽|魔|佛|画/g, keyword);
            }
            
            // 品级前缀
            const gradePrefix = {
                '黄级': '【黄级下品】入门级功法，适合炼气期修士修炼。',
                '玄级': '【玄级中品】不错的功法，筑基期修士使用威力不俗。',
                '地级': '【地级上品】高阶功法，金丹期以下修士很难练成，练成后威力惊人。',
                '天级': '【天级极品】绝世功法，整个修真界都没几本，元婴期修士都会抢破头。',
                '神级': '【神级传说】传说中的功法，只有上古时期才存在，修炼到极致可以封神。'
            };
            
            const fullDesc = gradePrefix[grade] + `【适配境界：${realm}期】` + desc;
            const story = generateStory();

            return {
                name,
                type: item.type,
                grade,
                difficulty,
                realm,
                description: fullDesc,
                sideEffect: side,
                story: story
            };
        }

        function generateSkills() {
            const typeFilter = document.getElementById('skillType').value;
            const difficultyFilter = document.getElementById('difficulty').value;
            const gradeFilter = document.getElementById('grade').value;
            const realmFilter = document.getElementById('realm').value;
            const count = parseInt(document.getElementById('count').value);
            const keyword = document.getElementById('keyword').value.trim();

            const resultSection = document.getElementById('resultSection');
            resultSection.innerHTML = '';
            usedSideEffects.clear();

            for (let i = 0; i < count; i++) {
                const skill = generateSkill(typeFilter, difficultyFilter, gradeFilter, realmFilter, keyword);
                if (skill) {
                    const card = createSkillCard(skill);
                    resultSection.appendChild(card);
                }
            }
        }

        function createSkillCard(skill) {
            const card = document.createElement('div');
            card.className = 'skill-card';
            
            card.innerHTML = `
                <div class="skill-header">
                    <div class="skill-name">${skill.name}</div>
                    <span class="skill-type type-${skill.type}">${skill.type}系</span>
                </div>
                <div class="skill-meta">
                    <div class="meta-item">
                        <span class="meta-label">功法品级</span>
                        <span class="meta-value grade-${skill.grade}">${skill.grade}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">修炼难度</span>
                        <span class="meta-value difficulty-${skill.difficulty}">${skill.difficulty}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">修为消耗</span>
                        <span class="meta-value">${getConsumption(skill.difficulty)}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">适配境界</span>
                        <span class="meta-value">${skill.realm}期</span>
                    </div>
                </div>
                <div class="skill-story">
                    <strong>📜 功法来历：</strong>${skill.story}
                </div>
                <div class="skill-desc">${skill.description}</div>
                <div class="skill-side-effect">
                    <strong>⚠️ 副作用：</strong>${skill.sideEffect}
                </div>
            `;

            return card;
        }

        function getConsumption(difficulty) {
            const consumptions = {
                '入门': '极低',
                '普通': '中等',
                '困难': '极高',
                '绝世': '寿元/精血'
            };
            return consumptions[difficulty];
        }

        function clearResults() {
            const resultSection = document.getElementById('resultSection');
            resultSection.innerHTML = `
                <div class="empty-state">
                    <h3>点击生成按钮开始获取灵感</h3>
                    <p>支持13大修炼体系 · 百万种功法组合 · 名称/效果/副作用绝不重复</p>
                </div>
            `;
        }

        function exportResults() {
            const cards = document.querySelectorAll('.skill-card');
            if (cards.length === 0) {
                alert('没有可导出的内容，请先生成功法');
                return;
            }

            let text = '修真功法灵感生成结果\n';
            text += '========================\n\n';

            cards.forEach((card, index) => {
                const name = card.querySelector('.skill-name').textContent;
                const type = card.querySelector('.skill-type').textContent;
                const grade = card.querySelectorAll('.meta-value')[0].textContent;
                const difficulty = card.querySelectorAll('.meta-value')[1].textContent;
                const consumption = card.querySelectorAll('.meta-value')[2].textContent;
                const realm = card.querySelectorAll('.meta-value')[3].textContent;
                const story = card.querySelector('.skill-story').textContent.replace('📜 功法来历：', '');
                const desc = card.querySelector('.skill-desc').textContent;
                const sideEffect = card.querySelector('.skill-side-effect').textContent.replace('⚠️ 副作用：', '');

                text += `${index + 1}. ${name}\n`;
                text += `   类型：${type}\n`;
                text += `   品级：${grade}\n`;
                text += `   难度：${difficulty}\n`;
                text += `   消耗：${consumption}\n`;
                text += `   适配：${realm}\n`;
                text += `   来历：${story}\n`;
                text += `   效果：${desc}\n`;
                text += `   副作用：${sideEffect}\n\n`;
            });

            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `功法灵感_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                generateSkills();
            }
            if (e.key === 'Escape') {
                clearResults();
            }
        });
    </script>
</body>
