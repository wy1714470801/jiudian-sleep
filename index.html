<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="基金查询">
<link rel="manifest" href="manifest.json">
<title>基金净值查询 v2.0</title>
<!-- 版本: 2.0 - 完整功能版本 -->
<style>
body{background:#f6f7fb;padding:16px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.card{max-width:520px;margin:auto;background:#fff;border-radius:14px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
textarea{width:100%;height:90px;padding:10px;font-size:16px;border-radius:10px;border:1px solid #ddd}
button{width:100%;padding:14px;margin-top:10px;font-size:18px;background:#4f46e5;color:#fff;border:none;border-radius:12px}
.item{border-bottom:1px solid #eee;padding:10px 0;line-height:1.6}
input{width:120px}
.up{color:#ef4444}
.down{color:#16a34a}
small{color:#666}
.name{display:block;color:#111;font-weight:600;margin-bottom:6px}
.row{display:flex;gap:8px;align-items:center;margin-top:6px}
.src{font-size:12px;color:#555;margin-top:4px}
.note{font-size:13px;color:#999}
.history-btn{display:inline-block;padding:6px 12px;margin-top:8px;font-size:14px;background:#10b981;color:#fff;border:none;border-radius:8px;cursor:pointer}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.5)}
.modal-content{background:#fff;margin:5% auto;padding:20px;border-radius:14px;width:90%;max-width:900px;max-height:80vh;overflow-y:auto}
.close{float:right;font-size:28px;font-weight:bold;cursor:pointer;color:#999}
.close:hover{color:#333}
.history-container{display:flex;gap:20px;margin-top:15px}
.history-table-wrapper{flex:1;min-width:300px}
.history-chart-wrapper{flex:1;min-width:300px}
.history-table{width:100%;border-collapse:collapse}
.history-table th,.history-table td{padding:10px;text-align:left;border-bottom:1px solid #eee}
.history-table th{background:#f9fafb;font-weight:600}
#historyChart{width:100%;height:300px;border:1px solid #eee;border-radius:8px}
@media(max-width:768px){.history-container{flex-direction:column}}
</style>
</head>

<body>
<div class="card">
<h2>📈 基金净值 & 当日盈亏 v2.0</h2>
<textarea id="codes" placeholder="输入基金代码（换行）"></textarea>
<button onclick="start()">查询</button>
<div style="margin-top:10px;font-size:13px;color:#666;">
  <span id="refreshStatus">💡 交易时间内每30秒自动刷新</span>
</div>
<div id="list"></div>
</div>

<div id="historyModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeHistory()">&times;</span>
<h3 id="historyTitle">历史净值</h3>
<div class="history-container">
<div class="history-table-wrapper">
<div id="historyData"></div>
</div>
<div class="history-chart-wrapper">
<canvas id="historyChart"></canvas>
</div>
</div>
</div>
</div>

<script>
function isTradingTime(){
  const d=new Date(),t=d.getHours()*60+d.getMinutes();
  return t>=570&&t<=900;
}

let domMap={},queue=[],working=false,currentTask=null;
const fundPool={};
let holding=JSON.parse(localStorage.getItem("holding")||"{}");
let cache=JSON.parse(localStorage.getItem("fundCache")||"{}");
const CODE_CACHE_KEY="lastFundCodes";
let autoRefreshTimer=null;
let currentCodes=[];

/* 页面加载恢复代码 */
window.addEventListener("DOMContentLoaded",()=>{
  const last=localStorage.getItem(CODE_CACHE_KEY);
  if(last) document.getElementById("codes").value=last;
});

/* 缓存 */
function loadCache(c){
  if(cache[c]) fundPool[c]={...cache[c],source:"本地缓存"};
}
function saveCache(c){
  if(!fundPool[c]?.price) return;
  cache[c]={...fundPool[c],time:Date.now()};
  localStorage.setItem("fundCache",JSON.stringify(cache));
}

/* 队列 */
function next(){
  working=false;
  if(queue.length) run(queue.shift());
}

/* JSONP 回调 */
window.jsonpgz=function(d){
  if(!currentTask||currentTask.finished||d.fundcode!==currentTask.code) return;
  const c=d.fundcode;
  fundPool[c]=fundPool[c]||{};
  fundPool[c].name=d.name;
  if(d.dwjz) fundPool[c].nav=parseFloat(d.dwjz);
  if(d.gsz){
    fundPool[c].price=parseFloat(d.gsz);
    fundPool[c].updateTime=d.gztime;
    fundPool[c].source="天天基金（估算）";
  }
  saveCache(c);
  render(c);
  finishTask();
};

/* 东方财富兜底 */
function loadEastMoney(task){
  const c=task.code;
  const s=document.createElement("script");
  s.src=`https://fund.eastmoney.com/pingzhongdata/${c}.js?_=${Date.now()}`;
  s.onload=()=>{
    if(task.finished) return;
    if(window.Data_netWorthTrend?.length){
      const arr=window.Data_netWorthTrend;
      fundPool[c]=fundPool[c]||{};
      fundPool[c].price=arr[arr.length-1][1];
      fundPool[c].nav ||= arr[arr.length-2]?.[1];
      fundPool[c].name ||= window.fS_name;
      fundPool[c].source="东方财富";
      saveCache(c);
      render(c);
    }
    finishTask();
    s.remove();
  };
  s.onerror=()=>{ s.remove(); finishTask(); };
  document.body.appendChild(s);
}

/* 任务控制 */
function finishTask(){
  if(!currentTask||currentTask.finished) return;
  currentTask.finished=true;
  currentTask=null;
  next();
}

/* 执行 */
function run(c){
  working=true;
  loadCache(c);
  render(c);

  currentTask={code:c,finished:false};

  const s=document.createElement("script");
  s.src=`https://fundgz.1234567.com.cn/js/${c}.js?_=${Date.now()}`;
  s.onerror=()=>{ s.remove(); loadEastMoney(currentTask); };
  document.body.appendChild(s);

  setTimeout(()=>{
    if(currentTask&&!currentTask.finished){
      loadEastMoney(currentTask);
    }
  },2500);
}

/* 查询 */
function query(c){
  queue.push(c);
  if(!working) next();
}

/* 渲染 */
function render(c){
  const el=domMap[c];
  if(!el) return;
  const d=fundPool[c]||{};
  const h=holding[c]||{};
  let html=`<span class="name">${d.name||c}</span>`;

  if(d.price){
    html+=`<div>当日预估净值：<strong>${d.price.toFixed(4)}</strong></div>`;
    if(d.updateTime){
      html+=`<small style="color:#999;display:block;margin-top:2px;">更新：${d.updateTime}</small>`;
    }
  }else{
    html+=`<div class="note">当前未获取到净值数据</div>`;
  }

  if(d.price&&d.nav){
    const diff=d.price-d.nav,pct=diff/d.nav*100;
    html+=`<div class="${diff>=0?'up':'down'}">
      当日涨跌：${diff.toFixed(4)}（${pct.toFixed(2)}%）
    </div>`;
  }

  if(d.price&&d.nav&&h.shares>0){
    const dayPL=(d.price-d.nav)*h.shares;
    html+=`<div class="${dayPL>=0?'up':'down'}">
      当日盈亏：${dayPL.toFixed(2)}
    </div>`;
  }

  if(d.price&&h.cost>0&&h.shares>0){
    const total=(d.price-h.cost)*h.shares;
    const pct=(d.price-h.cost)/h.cost*100;
    html+=`<div class="${total>=0?'up':'down'}">
      持仓收益：${total.toFixed(2)}（${pct.toFixed(2)}%）
    </div>`;
  }

  html+=`
  <div class="row">
    成本 <input value="${h.cost||''}"
      oninput="saveOnly('${c}','cost',this.value)">
    份额 <input value="${h.shares||''}"
      oninput="saveOnly('${c}','shares',this.value)">
  </div>
  <button class="history-btn" onclick="showHistory('${c}')">查看月度净值</button>
  <div class="src">数据来源：${d.source||"暂无（接口未返回）"}</div>
  <small>缓存时间：${d.time?new Date(d.time).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"—"}</small>
  `;
  el.innerHTML=html;
}

/* 只保存不重绘（解决输入退出问题） */
function saveOnly(c,k,v){
  holding[c]=holding[c]||{};
  holding[c][k]=parseFloat(v)||0;
  localStorage.setItem("holding",JSON.stringify(holding));
}

/* 启动 */
function start(){
  const codesText=document.getElementById("codes").value.trim();
  if(!codesText) return;

  localStorage.setItem(CODE_CACHE_KEY,codesText);

  const codes=codesText.split(/\s+/);
  currentCodes=codes;
  
  const list=document.getElementById("list");
  list.innerHTML="";
  domMap={};queue=[];working=false;currentTask=null;

  codes.forEach(c=>{
    const d=document.createElement("div");
    d.className="item";
    list.appendChild(d);
    domMap[c]=d;
    query(c);
  });
  
  startAutoRefresh();
}

/* 自动刷新 */
function startAutoRefresh(){
  if(autoRefreshTimer){
    clearInterval(autoRefreshTimer);
  }
  
  autoRefreshTimer=setInterval(()=>{
    if(currentCodes.length>0&&isTradingTime()){
      console.log('自动刷新中...',new Date().toLocaleTimeString());
      updateRefreshStatus('🔄 刷新中...');
      refreshAll();
      setTimeout(()=>{
        updateRefreshStatus('✅ 已更新 - '+new Date().toLocaleTimeString());
      },2000);
    }
  },30000);
}

/* 更新刷新状态 */
function updateRefreshStatus(text){
  const status=document.getElementById('refreshStatus');
  if(status) status.textContent=text;
}

/* 刷新所有基金 */
function refreshAll(){
  if(currentCodes.length===0) return;
  queue=[];
  working=false;
  currentTask=null;
  currentCodes.forEach(c=>{
    query(c);
  });
}

/* 页面卸载时清除定时器 */
window.addEventListener('beforeunload',()=>{
  if(autoRefreshTimer){
    clearInterval(autoRefreshTimer);
  }
});

/* 查看历史净值 */
function showHistory(code){
  const modal=document.getElementById("historyModal");
  const title=document.getElementById("historyTitle");
  const data=document.getElementById("historyData");
  
  const fundName=fundPool[code]?.name||code;
  title.textContent=`${fundName} - 月度净值记录`;
  data.innerHTML='<div style="text-align:center;padding:20px;">加载中...</div>';
  modal.style.display="block";
  
  fetchHistory(code);
}

function closeHistory(){
  document.getElementById("historyModal").style.display="none";
}

function fetchHistory(code){
  const data=document.getElementById("historyData");
  const savedData=window.Data_netWorthTrend;
  
  const script=document.createElement("script");
  script.src=`https://fund.eastmoney.com/pingzhongdata/${code}.js?_=${Date.now()}`;
  
  script.onload=()=>{
    setTimeout(()=>{
      try{
        if(!window.Data_netWorthTrend||!window.Data_netWorthTrend.length){
          data.innerHTML='<div style="text-align:center;padding:20px;color:#999;">暂无历史数据</div>';
          script.remove();
          return;
        }
        
        const allData=[...window.Data_netWorthTrend];
        window.Data_netWorthTrend=savedData;
        const weekData=allData.slice(-30).reverse();
        const h=holding[code]||{};
        const hasCost=h.cost>0&&h.shares>0;
        
        let html='<table class="history-table"><thead><tr><th>日期</th><th>单位净值</th><th>涨跌幅</th>';
        if(hasCost){
          html+='<th>当日收益</th><th>持仓收益</th><th>收益率</th>';
        }
        html+='</tr></thead><tbody>';
        
        let validCount=0;
        weekData.forEach((item,idx)=>{
          let timestamp,nav;
          
          if(Array.isArray(item)&&item.length>=2){
            timestamp=item[0];
            nav=item[1];
          }else if(typeof item==='object'&&item!==null){
            timestamp=item.x||item.date||item.time;
            nav=item.y||item.nav||item.value;
          }else{
            return;
          }
          
          if(typeof nav!=='number'||isNaN(nav)) return;
          
          validCount++;
          const date=new Date(timestamp).toLocaleDateString("zh-CN",{year:'numeric',month:'2-digit',day:'2-digit'});
          const navStr=nav.toFixed(4);
          let change='—';
          let changeClass='';
          let dayProfit='—';
          let dayProfitClass='';
          
          if(idx<weekData.length-1&&weekData[idx+1]){
            let prevNav;
            if(Array.isArray(weekData[idx+1])){
              prevNav=weekData[idx+1][1];
            }else if(typeof weekData[idx+1]==='object'){
              prevNav=weekData[idx+1].y||weekData[idx+1].nav||weekData[idx+1].value;
            }
            
            if(typeof prevNav==='number'&&!isNaN(prevNav)){
              const diff=nav-prevNav;
              const pct=(diff/prevNav*100).toFixed(2);
              change=`${diff>=0?'+':''}${pct}%`;
              changeClass=diff>=0?'up':'down';
              
              if(hasCost){
                const dailyProfit=diff*h.shares;
                dayProfit=dailyProfit.toFixed(2);
                dayProfitClass=dailyProfit>=0?'up':'down';
              }
            }
          }
          
          html+=`<tr><td>${date}</td><td>${navStr}</td><td class="${changeClass}">${change}</td>`;
          
          if(hasCost){
            html+=`<td class="${dayProfitClass}">${dayProfit}</td>`;
            const profit=(nav-h.cost)*h.shares;
            const profitRate=((nav-h.cost)/h.cost*100).toFixed(2);
            const profitClass=profit>=0?'up':'down';
            html+=`<td class="${profitClass}">${profit.toFixed(2)}</td><td class="${profitClass}">${profitRate}%</td>`;
          }
          
          html+=`</tr>`;
        });
        
        html+='</tbody></table>';
        
        if(hasCost&&validCount>0){
          const latestNav=Array.isArray(weekData[0])?weekData[0][1]:(weekData[0].y||weekData[0].nav||weekData[0].value);
          const oldestNav=Array.isArray(weekData[validCount-1])?weekData[validCount-1][1]:(weekData[validCount-1].y||weekData[validCount-1].nav||weekData[validCount-1].value);
          
          if(typeof latestNav==='number'&&typeof oldestNav==='number'){
            const monthProfit=(latestNav-oldestNav)*h.shares;
            const monthProfitRate=((latestNav-oldestNav)/oldestNav*100).toFixed(2);
            const profitClass=monthProfit>=0?'up':'down';
            
            html+=`<div style="margin-top:15px;padding:12px;background:#f9fafb;border-radius:8px;">
              <div style="font-weight:600;margin-bottom:8px;">📊 月度持仓统计</div>
              <div>持仓成本：${h.cost.toFixed(4)} × ${h.shares}份 = ${(h.cost*h.shares).toFixed(2)}元</div>
              <div>当前市值：${latestNav.toFixed(4)} × ${h.shares}份 = ${(latestNav*h.shares).toFixed(2)}元</div>
              <div class="${profitClass}">月度收益：${monthProfit.toFixed(2)}元（${monthProfitRate}%）</div>
              <div class="${(latestNav-h.cost)*h.shares>=0?'up':'down'}">总收益：${((latestNav-h.cost)*h.shares).toFixed(2)}元（${(((latestNav-h.cost)/h.cost)*100).toFixed(2)}%）</div>
            </div>`;
          }
        }
        
        if(validCount===0){
          data.innerHTML='<div style="text-align:center;padding:20px;color:#999;">数据格式不支持</div>';
        }else{
          data.innerHTML=html;
          drawChart(weekData);
        }
      }catch(e){
        data.innerHTML=`<div style="text-align:center;padding:20px;color:#ef4444;">数据处理失败: ${e.message}</div>`;
      }
      script.remove();
    },100);
  };
  
  script.onerror=()=>{
    data.innerHTML='<div style="text-align:center;padding:20px;color:#ef4444;">加载失败</div>';
    script.remove();
    window.Data_netWorthTrend=savedData;
  };
  
  document.body.appendChild(script);
}

window.onclick=function(event){
  const modal=document.getElementById("historyModal");
  if(event.target===modal) closeHistory();
}

/* 绘制曲线图 */
function drawChart(data){
  const canvas=document.getElementById("historyChart");
  const ctx=canvas.getContext("2d");
  
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*2;
  canvas.height=rect.height*2;
  ctx.scale(2,2);
  
  const width=rect.width;
  const height=rect.height;
  const padding={top:20,right:20,bottom:40,left:50};
  const chartWidth=width-padding.left-padding.right;
  const chartHeight=height-padding.top-padding.bottom;
  
  const values=[];
  const dates=[];
  
  for(let i=data.length-1;i>=0;i--){
    const item=data[i];
    let nav;
    if(Array.isArray(item)){
      nav=item[1];
      dates.push(new Date(item[0]));
    }else if(typeof item==='object'){
      nav=item.y||item.nav||item.value;
      dates.push(new Date(item.x||item.date||item.time));
    }
    if(typeof nav==='number'&&!isNaN(nav)){
      values.push(nav);
    }
  }
  
  if(values.length===0) return;
  
  const maxVal=Math.max(...values);
  const minVal=Math.min(...values);
  const range=maxVal-minVal||1;
  
  ctx.clearRect(0,0,width,height);
  
  ctx.strokeStyle="#f0f0f0";
  ctx.lineWidth=1;
  for(let i=0;i<=5;i++){
    const y=padding.top+chartHeight*i/5;
    ctx.beginPath();
    ctx.moveTo(padding.left,y);
    ctx.lineTo(padding.left+chartWidth,y);
    ctx.stroke();
  }
  
  ctx.fillStyle="#666";
  ctx.font="11px sans-serif";
  ctx.textAlign="right";
  for(let i=0;i<=5;i++){
    const val=maxVal-range*i/5;
    const y=padding.top+chartHeight*i/5;
    ctx.fillText(val.toFixed(4),padding.left-5,y+4);
  }
  
  ctx.strokeStyle="#4f46e5";
  ctx.lineWidth=2;
  ctx.beginPath();
  
  values.forEach((val,idx)=>{
    const x=padding.left+chartWidth*idx/(values.length-1||1);
    const y=padding.top+chartHeight*(1-(val-minVal)/range);
    
    if(idx===0){
      ctx.moveTo(x,y);
    }else{
      ctx.lineTo(x,y);
    }
  });
  
  ctx.stroke();
  
  ctx.fillStyle="#4f46e5";
  values.forEach((val,idx)=>{
    const x=padding.left+chartWidth*idx/(values.length-1||1);
    const y=padding.top+chartHeight*(1-(val-minVal)/range);
    
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fill();
  });
  
  ctx.fillStyle="#666";
  ctx.font="10px sans-serif";
  ctx.textAlign="center";
  const step=Math.ceil(dates.length/5);
  dates.forEach((date,idx)=>{
    if(idx%step===0||idx===dates.length-1){
      const x=padding.left+chartWidth*idx/(values.length-1||1);
      const dateStr=(date.getMonth()+1)+'/'+(date.getDate());
      ctx.fillText(dateStr,x,height-padding.bottom+20);
    }
  });
}
</script>
</body>
</html>
